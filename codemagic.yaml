workflows:
  ios_appstore:
    name: Damascus Projects iOS App Store
    instance_type: mac_mini_m2

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.example.webviewWrapper"

    integrations:
      app_store_connect: codemagic-app-store-connect

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
        - ios/Pods

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Install iOS pods
        script: |
          cd ios
          pod install

      - name: Set iOS code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=${CM_BUILD_NUMBER}

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - ios/Flutter/Flutter.framework
